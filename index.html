<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원, 더 월드 — Won, the World</title>
<style>
  :root{
    --bg:#0a0a24; --ink:#f3f1ff; --muted:#b9b5e0;
    --glass:rgba(20,18,52,.72); --glass-line:rgba(150,140,255,.35);
    --gold:#ffd24d; --good:#46e6a0; --bad:#ff6b7d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:radial-gradient(circle at 50% 30%,#1a1850,#070716 70%);
    color:var(--ink); overflow-x:hidden;
  }
  a{color:inherit}

  /* ===== 상단 진행바 ===== */
  header{
    position:sticky;top:0;z-index:40;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:10px 18px;
    background:rgba(8,8,26,.82);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--glass-line);
  }
  header .logo{font-weight:800;font-size:18px;letter-spacing:.5px}
  header .logo small{font-weight:500;color:var(--muted);font-size:12px;margin-left:6px}
  .bar-wrap{flex:1;min-width:160px;height:12px;background:rgba(255,255,255,.1);
    border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,#7df0c8,#ffd24d);transition:width .6s ease}
  .count{font-weight:700;font-size:14px;white-space:nowrap}
  .btn-reset{background:none;border:1px solid var(--glass-line);color:var(--muted);
    padding:6px 12px;border-radius:99px;cursor:pointer;font-size:12px;font-family:inherit}
  .btn-reset:hover{color:var(--ink);border-color:#fff}

  /* ===== 지도 ===== */
  #map{
    position:relative;width:100%;max-width:1280px;margin:0 auto;
    aspect-ratio:1600/897;
  }
  #map img{width:100%;height:100%;display:block;border-radius:0 0 18px 18px}

  .node{
    position:absolute;transform:translate(-50%,-50%);
    width:clamp(40px,4.4vw,62px);height:clamp(40px,4.4vw,62px);
    border-radius:50%;cursor:pointer;border:none;
    display:grid;place-items:center;
    font-weight:800;font-size:clamp(16px,1.7vw,24px);color:#fff;
    background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.9),var(--c) 70%);
    box-shadow:0 0 0 3px rgba(255,255,255,.5),0 0 22px 4px var(--c);
    transition:transform .15s ease, box-shadow .2s ease;
    font-family:inherit;
  }
  .node .emoji{font-size:.85em;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
  .node:hover{transform:translate(-50%,-50%) scale(1.12)}
  .node .badge{
    position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);
    white-space:nowrap;font-size:11px;font-weight:700;color:#fff;
    background:rgba(0,0,0,.6);padding:2px 8px;border-radius:99px;
    border:1px solid rgba(255,255,255,.25);pointer-events:none;
  }
  /* 상태 */
  .node.locked{background:radial-gradient(circle at 35% 30%,#6a6a86,#33334a 70%);
    box-shadow:0 0 0 3px rgba(255,255,255,.18);cursor:not-allowed;color:#cfcfe0}
  .node.locked:hover{transform:translate(-50%,-50%)}
  .node.available{animation:pulse 1.6s infinite}
  .node.done::after{
    content:"✓";position:absolute;top:-8px;right:-8px;
    width:24px;height:24px;border-radius:50%;background:var(--good);color:#063;
    display:grid;place-items:center;font-size:14px;font-weight:900;
    box-shadow:0 0 8px var(--good);
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 3px rgba(255,255,255,.6),0 0 18px 3px var(--c)}
    50%{box-shadow:0 0 0 6px rgba(255,255,255,.35),0 0 34px 10px var(--c)}
  }

  .hint{text-align:center;color:var(--muted);font-size:14px;margin:14px 0 30px}

  /* ===== 도시 패널(모달) ===== */
  #overlay{
    position:fixed;inset:0;z-index:60;display:none;
    background:rgba(4,4,16,.72);backdrop-filter:blur(4px);
    padding:24px;overflow:auto;
  }
  #overlay.open{display:block}
  .panel{
    max-width:760px;margin:24px auto;background:var(--glass);
    border:1px solid var(--glass-line);border-radius:22px;
    box-shadow:0 24px 80px rgba(0,0,0,.6);overflow:hidden;
  }
  .panel-head{
    padding:26px 28px;color:#fff;position:relative;
    background:linear-gradient(135deg,var(--c),rgba(0,0,0,.25));
  }
  .panel-head .num{opacity:.8;font-weight:700;letter-spacing:2px;font-size:13px}
  .panel-head h2{font-size:30px;margin-top:4px;display:flex;align-items:center;gap:10px}
  .close{position:absolute;top:18px;right:20px;background:rgba(0,0,0,.3);
    border:none;color:#fff;width:38px;height:38px;border-radius:50%;
    font-size:20px;cursor:pointer}
  .close:hover{background:rgba(0,0,0,.55)}
  .panel-body{padding:26px 28px 32px}

  .sec-label{font-size:13px;font-weight:800;letter-spacing:1px;color:var(--gold);
    text-transform:uppercase;margin:6px 0 10px}
  .learn{line-height:1.75;font-size:16px;color:#eceaff}
  .learn h3{font-size:18px;margin:18px 0 8px;color:#fff}
  .learn p{margin:8px 0}
  .learn ul{margin:8px 0 8px 20px}
  .learn .box{background:rgba(255,255,255,.06);border:1px solid var(--glass-line);
    border-radius:12px;padding:14px 16px;margin:12px 0}
  .learn .formula{font-size:20px;text-align:center;padding:14px;
    background:rgba(0,0,0,.3);border-radius:12px;margin:12px 0;letter-spacing:.5px}

  /* 퀴즈 */
  .quiz{margin-top:26px;border-top:1px solid var(--glass-line);padding-top:22px}
  .q{margin-bottom:22px}
  .q .qtext{font-weight:700;font-size:16px;margin-bottom:10px}
  .opt{display:block;width:100%;text-align:left;margin:7px 0;padding:12px 14px;
    background:rgba(255,255,255,.05);border:1px solid var(--glass-line);
    border-radius:12px;color:var(--ink);cursor:pointer;font-size:15px;
    font-family:inherit;transition:.12s}
  .opt:hover{background:rgba(255,255,255,.12)}
  .opt.sel{border-color:#fff;background:rgba(255,255,255,.16)}
  .opt.correct{border-color:var(--good);background:rgba(70,230,160,.18)}
  .opt.wrong{border-color:var(--bad);background:rgba(255,107,125,.18)}
  .explain{font-size:14px;color:var(--muted);margin-top:8px;padding-left:4px;display:none}
  .explain.show{display:block}

  .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;align-items:center}
  .btn{padding:13px 22px;border-radius:99px;border:none;cursor:pointer;
    font-weight:800;font-size:15px;font-family:inherit}
  .btn-primary{background:linear-gradient(90deg,#7df0c8,#ffd24d);color:#0a0a24}
  .btn-primary:hover{filter:brightness(1.08)}
  .btn-ghost{background:rgba(255,255,255,.08);color:var(--ink);border:1px solid var(--glass-line)}
  .score{font-weight:800;font-size:16px}
  .score.pass{color:var(--good)} .score.failscore{color:var(--bad)}

  /* 완주 축하 */
  #win{position:fixed;inset:0;z-index:80;display:none;place-items:center;
    background:rgba(4,4,16,.9);text-align:center;padding:24px}
  #win.open{display:grid}
  #win .card{max-width:520px;background:var(--glass);border:1px solid var(--gold);
    border-radius:22px;padding:40px}
  #win h2{font-size:34px;margin-bottom:10px}
  #win p{color:var(--muted);line-height:1.7;margin-bottom:22px}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;z-index:79;pointer-events:none}
</style>
</head>
<body>

<header>
  <div class="logo">원, 더 월드 <small>Won, the World · 중3 수학 탐험</small></div>
  <div class="bar-wrap"><div class="bar-fill" id="barFill"></div></div>
  <div class="count" id="count">0 / 10</div>
  <button class="btn-reset" id="resetBtn">진행 초기화</button>
</header>

<div id="map">
  <img id="mapImg" alt="원 더 월드 로드맵">
  <!-- 노드는 JS가 생성 -->
</div>
<p class="hint">🔓 빛나는 도시를 눌러 학습을 시작하세요. 한 도시를 완료하면 다음 도시가 열립니다.</p>

<!-- 도시 학습 패널 -->
<div id="overlay">
  <div class="panel" id="panel"></div>
</div>

<!-- 완주 축하 -->
<div id="win">
  <div class="card">
    <h2>🎉 모든 도시 정복 완료!</h2>
    <p>10개 도시를 모두 클리어하고 <b>봉인해제의 관문</b>을 통과했어요.<br>진정한 원, 더 월드의 탐험가입니다!</p>
    <button class="btn btn-primary" onclick="document.getElementById('win').classList.remove('open')">지도로 돌아가기</button>
  </div>
</div>

<script>
/* ============================================================
   ✏️ 콘텐츠 편집 영역 — 여기만 고치면 됩니다.
   각 도시(city) 객체:
     n       : 번호(1~10)
     name    : 도시 이름
     emoji   : 아이콘
     color   : 테마 색(HEX)
     x, y    : 지도 위 위치(%) — 보통 건드릴 필요 없음
     intro   : 한 줄 소개(학습 목표)
     learn   : 학습 내용(HTML 문자열). <h3> <p> <ul> <div class="box"> <div class="formula"> 사용 가능
     quiz    : 문제 배열. 각 문제 = { q:질문, opts:[보기...], answer:정답인덱스(0부터), explain:해설 }
               quiz를 빈 배열 [] 로 두면 '도시 완료' 버튼만 나옵니다(설명만 있는 도시).
   ============================================================ */
const CITIES = [
  {
    n:1, name:"시작의 광장", emoji:"💗", color:"#ff6b9d", x:40, y:22,
    intro:"여정의 출발점. 탐험 규칙을 익히고 모험을 시작합니다.",
    learn:`<h3>원, 더 월드에 온 것을 환영합니다!</h3>
      <p>이곳은 10개 도시를 여행하며 중3 수학을 정복하는 학습 세계입니다.</p>
      <div class="box">🗺️ <b>규칙</b><br>한 도시의 퀴즈를 통과하면 다음 도시가 열려요. 시작의 광장에서 출발해 봉인해제의 관문까지 한 바퀴!</div>
      <p>아래 <b>'출발하기'</b>를 누르면 첫 도시가 열립니다.</p>`,
    quiz:[]
  },
  {
    n:2, name:"물의 도시", emoji:"💧", color:"#3aa9ff", x:58, y:24,
    intro:"(예시) 제곱근과 실수 — 내용을 채워 넣으세요.",
    learn:`<h3>여기에 학습 내용을 입력하세요</h3>
      <p>예시입니다. 이 부분을 실제 수업 내용으로 교체하면 됩니다.</p>
      <div class="formula">√a × √b = √(ab)</div>
      <ul><li>제곱근의 뜻</li><li>근호를 포함한 식의 계산</li></ul>`,
    quiz:[
      { q:"√9 의 값은?", opts:["2","3","9","81"], answer:1, explain:"3×3=9 이므로 √9 = 3 입니다." },
      { q:"√2 × √8 의 값은?", opts:["√10","4","√16","2"], answer:1, explain:"√2×√8=√16=4 입니다." }
    ]
  },
  {
    n:3, name:"얼음의 도시", emoji:"❄️", color:"#6fe0ff", x:75, y:40,
    intro:"(예시) 다항식의 곱셈 — 내용을 채워 넣으세요.",
    learn:`<h3>여기에 학습 내용을 입력하세요</h3>
      <div class="formula">(a+b)² = a² + 2ab + b²</div>
      <p>곱셈 공식을 활용해 식을 전개합니다.</p>`,
    quiz:[
      { q:"(x+3)² 을 전개하면?", opts:["x²+9","x²+6x+9","x²+3x+9","x²+6x+3"], answer:1, explain:"(a+b)²=a²+2ab+b² → x²+6x+9" }
    ]
  },
  {
    n:4, name:"불의 도시", emoji:"🔥", color:"#ff5a3c", x:80, y:49,
    intro:"(예시) 인수분해 — 내용을 채워 넣으세요.",
    learn:`<h3>여기에 학습 내용을 입력하세요</h3>
      <div class="formula">x² + (a+b)x + ab = (x+a)(x+b)</div>`,
    quiz:[
      { q:"x²+5x+6 을 인수분해하면?", opts:["(x+2)(x+3)","(x+1)(x+6)","(x+2)(x+4)","(x-2)(x-3)"], answer:0, explain:"곱이 6, 합이 5 → 2와 3" }
    ]
  },
  {
    n:5, name:"바람의 도시", emoji:"🌬️", color:"#9be36b", x:75, y:64,
    intro:"(예시) 이차방정식 — 내용을 채워 넣으세요.",
    learn:`<h3>여기에 학습 내용을 입력하세요</h3>
      <div class="formula">ax² + bx + c = 0</div>`,
    quiz:[
      { q:"x²-4=0 의 해는?", opts:["x=2","x=±2","x=4","x=±4"], answer:1, explain:"x²=4 → x=±2" }
    ]
  },
  {
    n:6, name:"비눗방울 마을", emoji:"🫧", color:"#c9a7ff", x:60, y:72,
    intro:"(예시) 이차방정식의 활용 — 내용을 채워 넣으세요.",
    learn:`<h3>여기에 학습 내용을 입력하세요</h3>
      <p>실생활 문제를 이차방정식으로 세워 해결합니다.</p>`,
    quiz:[
      { q:"근의 공식에서 판별식은?", opts:["b²-4ac","b²+4ac","2a","-b/2a"], answer:0, explain:"판별식 D = b²-4ac" }
    ]
  },
  {
    n:7, name:"별의 도시", emoji:"⭐", color:"#ffd24d", x:45, y:78,
    intro:"(예시) 이차함수의 그래프 — 내용을 채워 넣으세요.",
    learn:`<h3>여기에 학습 내용을 입력하세요</h3>
      <div class="formula">y = ax² + bx + c</div>`,
    quiz:[
      { q:"y=x² 그래프의 꼭짓점은?", opts:["(0,0)","(1,1)","(0,1)","(1,0)"], answer:0, explain:"원점 (0,0) 이 꼭짓점입니다." }
    ]
  },
  {
    n:8, name:"빛의 도시", emoji:"✨", color:"#ffe9a8", x:30, y:70,
    intro:"(예시) 이차함수의 최댓값·최솟값 — 내용을 채워 넣으세요.",
    learn:`<h3>여기에 학습 내용을 입력하세요</h3>
      <p>꼭짓점을 이용해 최대·최소를 구합니다.</p>`,
    quiz:[
      { q:"y=(x-2)²+3 의 최솟값은?", opts:["2","3","-3","5"], answer:1, explain:"꼭짓점 (2,3), 아래로 볼록이므로 최솟값 3" }
    ]
  },
  {
    n:9, name:"보석의 도시", emoji:"💎", color:"#7df0c8", x:16, y:46,
    intro:"(예시) 삼각비 — 내용을 채워 넣으세요.",
    learn:`<h3>여기에 학습 내용을 입력하세요</h3>
      <div class="formula">sin A = 높이/빗변</div>`,
    quiz:[
      { q:"sin 30° 의 값은?", opts:["1/2","√3/2","1","√2/2"], answer:0, explain:"sin 30° = 1/2" }
    ]
  },
  {
    n:10, name:"봉인해제의 관문", emoji:"🌀", color:"#b06bff", x:22, y:23,
    intro:"최종 관문 — 종합 문제로 모든 도시를 정복했는지 확인합니다.",
    learn:`<h3>마지막 관문입니다</h3>
      <p>지금까지 배운 내용을 종합한 문제를 풀어 봉인을 해제하세요!</p>`,
    quiz:[
      { q:"(예시) √16 + 3² 의 값은?", opts:["7","13","19","25"], answer:1, explain:"4 + 9 = 13" }
    ]
  }
];
/* ===== 편집 영역 끝 ===== */

/* ---------- 로직 ---------- */
const STORAGE_KEY = 'wtw_progress_v1';
let done = loadProgress();

function loadProgress(){
  try{ return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')); }
  catch(e){ return new Set(); }
}
function saveProgress(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...done]));
}
function isUnlocked(n){
  return n===1 || done.has(n-1);
}

const mapEl = document.getElementById('map');
function renderMap(){
  // 노드 제거 후 다시 그림
  [...mapEl.querySelectorAll('.node')].forEach(e=>e.remove());
  CITIES.forEach(c=>{
    const b=document.createElement('button');
    b.className='node';
    b.style.left=c.x+'%'; b.style.top=c.y+'%'; b.style.setProperty('--c',c.color);
    const state = done.has(c.n) ? 'done' : (isUnlocked(c.n) ? 'available' : 'locked');
    b.classList.add(state);
    b.innerHTML = state==='locked'
      ? `<span class="emoji">🔒</span><span class="badge">${c.n}. ${c.name}</span>`
      : `<span class="emoji">${c.emoji}</span><span class="badge">${c.n}. ${c.name}</span>`;
    if(state!=='locked') b.onclick=()=>openCity(c);
    else b.onclick=()=>{ b.animate([{transform:'translate(-50%,-50%) translateX(-4px)'},{transform:'translate(-50%,-50%) translateX(4px)'},{transform:'translate(-50%,-50%)'}],{duration:240}); };
    mapEl.appendChild(b);
  });
  // 진행바
  const c=done.size;
  document.getElementById('barFill').style.width=(c/CITIES.length*100)+'%';
  document.getElementById('count').textContent=`${c} / ${CITIES.length}`;
}

const overlay=document.getElementById('overlay');
const panel=document.getElementById('panel');

function openCity(c){
  const hasQuiz = c.quiz && c.quiz.length>0;
  let quizHTML='';
  if(hasQuiz){
    quizHTML = `<div class="quiz"><div class="sec-label">퀴즈 (${c.quiz.length}문항)</div>` +
      c.quiz.map((q,qi)=>`
        <div class="q" data-qi="${qi}">
          <div class="qtext">Q${qi+1}. ${q.q}</div>
          ${q.opts.map((o,oi)=>`<button class="opt" data-oi="${oi}" onclick="selectOpt(${qi},${oi})">${o}</button>`).join('')}
          <div class="explain" id="exp-${qi}">💡 ${q.explain||''}</div>
        </div>`).join('') +
      `<div class="actions">
         <button class="btn btn-primary" id="submitBtn" onclick="gradeQuiz()">채점하기</button>
         <span class="score" id="scoreTxt"></span>
       </div></div>`;
  } else {
    quizHTML = `<div class="actions" style="margin-top:26px">
        <button class="btn btn-primary" onclick="completeCity(${c.n})">${c.n===1?'출발하기 🚀':'이 도시 완료 ✓'}</button>
      </div>`;
  }

  panel.style.setProperty('--c',c.color);
  panel.innerHTML = `
    <div class="panel-head" style="--c:${c.color}">
      <button class="close" onclick="closeCity()">✕</button>
      <div class="num">CITY ${String(c.n).padStart(2,'0')}</div>
      <h2><span>${c.emoji}</span> ${c.name}</h2>
      <div style="opacity:.9;margin-top:6px">${c.intro||''}</div>
    </div>
    <div class="panel-body">
      <div class="sec-label">학습 내용</div>
      <div class="learn">${c.learn||''}</div>
      ${quizHTML}
    </div>`;
  panel._city=c; panel._answers={};
  overlay.classList.add('open');
  overlay.scrollTop=0;
}

function selectOpt(qi,oi){
  if(panel._graded) return;
  panel._answers[qi]=oi;
  const qEl=panel.querySelector(`.q[data-qi="${qi}"]`);
  qEl.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  qEl.querySelector(`.opt[data-oi="${oi}"]`).classList.add('sel');
}

function gradeQuiz(){
  const c=panel._city;
  if(Object.keys(panel._answers).length < c.quiz.length){
    alert('모든 문제를 풀어주세요!'); return;
  }
  panel._graded=true;
  let correct=0;
  c.quiz.forEach((q,qi)=>{
    const qEl=panel.querySelector(`.q[data-qi="${qi}"]`);
    const sel=panel._answers[qi];
    if(sel===q.answer) correct++;
    qEl.querySelectorAll('.opt').forEach(o=>{
      const oi=+o.dataset.oi;
      if(oi===q.answer) o.classList.add('correct');
      else if(oi===sel) o.classList.add('wrong');
      o.style.pointerEvents='none';
    });
    document.getElementById('exp-'+qi).classList.add('show');
  });
  const total=c.quiz.length, pass=correct/total>=0.6;
  const txt=document.getElementById('scoreTxt');
  txt.textContent=`${correct} / ${total} 정답 ${pass?'— 통과!':'— 60% 이상이어야 통과'}`;
  txt.className='score '+(pass?'pass':'failscore');
  const btn=document.getElementById('submitBtn');
  if(pass){
    btn.textContent='완료하고 다음 도시 해금 →';
    btn.onclick=()=>completeCity(c.n);
  } else {
    btn.textContent='다시 풀기';
    btn.onclick=()=>openCity(c);
  }
}

function completeCity(n){
  done.add(n); saveProgress();
  closeCity(); renderMap();
  if(done.size===CITIES.length){
    setTimeout(()=>{ document.getElementById('win').classList.add('open'); celebrate(); }, 350);
  }
}

function closeCity(){ overlay.classList.remove('open'); }
overlay.addEventListener('click',e=>{ if(e.target===overlay) closeCity(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeCity(); });

document.getElementById('resetBtn').onclick=()=>{
  if(confirm('진행 상황을 모두 초기화할까요?')){ done=new Set(); saveProgress(); renderMap(); }
};

function celebrate(){
  const colors=['#ffd24d','#7df0c8','#ff6b9d','#6fe0ff','#b06bff'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    c.animate([{top:'-10px',opacity:1},{top:'100vh',opacity:.9}],
      {duration:2200+Math.random()*1500,easing:'cubic-bezier(.3,.7,.4,1)'});
    setTimeout(()=>c.remove(),3800);
  }
}
